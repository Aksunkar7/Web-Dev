<div class="product-grid">
    @for(product of products; track product.id){
        <div class='product-card'>
            <div class="main-image-container">
                <img [src]="product.image" [alt]="product.name" class="main-image">
            </div>
            
            <div class="thumbnail-row">
                @for (img of product.images; track img) {
                  <div class="thumb-item">
                    <img 
                      [src]="img" 
                      (click)="changeImage(product, img)" 
                      [class.active]="product.image === img"
                      class="thumbnail">
                  </div>  
                }
              </div>

            <h3>{{ product.name }}</h3>
            <p class='description'>Description: {{product.description}}</p>
            <div class="price">{{product.price}} Tg</div>
            <div class='rating'>{{product.rating}}⭐</div>
            <a [href]='product.link' target='_blank' class='kaspi-button'>Buy on kaspi</a>
            <button (click)='shareOnTelegram(product.link)' class='share'>Share on telegram</button>
            <button (click)='shareOnWhatsapp(product.link)' class='share'>Share on whatsapp</button>
        
        </div>
}
</div>
